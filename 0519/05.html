<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let date = new Date();

        let year = date.getFullYear();
        let month = date.getMonth() + 1;
        let day = date.getDate();
        let hours = date.getHours();
        let minutes = date.getMinutes();
        let seconds = date.getSeconds();
        
        if (hours < 13) {
            alert("현재 날짜와 시간: " + year + "년 " + month + "월 " + day + "일 " + "오전" + hours + "시 " + minutes + "분 " + seconds + "초");
        }
        else {
            alert("현재 날짜와 시간: " + year + "년 " + month + "월 " + day + "일 " + "오후" + (hours - 12) + "시 " + minutes + "분 " + seconds + "초");
        }
    </script>
</head>
<body>
    
</body>
</html>
