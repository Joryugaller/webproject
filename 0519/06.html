<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let date = new Date();
        let hours = date.getHours();
        if (hours < 5) {
            alert("현재 시간은 새벽입니다. 좀 더 주무세요.");
        }
        else{
            if (hours < 7) {
                alert("출근준비 ㄱ")
            }
            else {
                if (hours < 9) {
                    alert("출근중")
                }
                else {
                    if (hours < 12) {
                        alert("업무중")
                    }
                    else {
                        if (hours < 13) {
                            alert("점심시간")
                        }
                        else {
                            if (hours < 18) {
                                alert("업무중")
                            }
                            else {
                                alert("퇴근시간")
                            }
                        }                       
                    }
                }
            }
        }
        
    </script>
</head>
<body>
    
</body>
</html>
