<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin : 0;
            padding : 0;
        }
        body{
            width: 950px;
            margin: 0 auto;
            overflow: hidden;

        }
        #menu{
            width: 200px;
            float: left;
        }
        #content{
            width: 750px;
            height: 500px;
            background-color: lightgray;
            float: right;
        }
        li{
            list-style: none;
        }
        @media screen and (max-width: 767px){
            body{
                width: auto;
            }
            #menu{
                width: auto;
                float: none;
            }
            #content{
                width: auto;
                float: none;
            }
        }
    </style>
</head>
<body>
    <div id = "menu">
        <ul>
            <li>Menu 1</li>
            <li>Menu 2</li>
            <li>Menu 3</li>
        </ul>
    </div>
    <div id = "content">
        <h1>Content</h1>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate.</p>

    </div>
</body>
</html>
