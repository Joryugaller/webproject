<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .first{
            font-size:32px;
            font-style: italic;
        }
        .second{
            font-size: 2em;
            font-weight: bold;
        }
        .third{
            font-size: large;
            font-family: 'Times New Roman', Times, serif;
        }
        .fourth{
            font-size: small;
            text-align: right;
        }
    </style>
</head>
<body>
    <h1>글자 속성 : font-size></h1>
<p class ="first">글자 속성 : font-size</p>
    <p class ="second">글자 속성 : font-size</p>
    <p class ="third">글자 속성 : font-size</p>
    <p class ="fourth">글자 속성 : font-size</p>
</body>
</html>
