<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>display속성</title>
    <style>
        #box{
            display: inline; /*inline일때와 비교 : margin은 좌우,너비와 높이 적용 안됨/ inline block일때 적용됨*/
            width: 100px;
            height: 50px;
            background-color: lightblue;
            margin: 10px;
        }
    </style>
</head>
<body>
    <p>이 문단은 display 속성의 값 중에서 inline과 inline-block의 차이점 비교</p>
    <span>inline 요소</span>
    <div id ="box">차이점 비교 대상</div>
    <span>inline 요소</span>
    <p>이 문단은 display 속성의 값 중에서 inline과 inline-block의 차이점 비교</p>
</body>
</html>
